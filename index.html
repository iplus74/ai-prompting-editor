<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div style="display: flex; justify-content: flex-end; margin-bottom: 1rem;">
      <button class="btn btn-secondary btn-small" id="settings-btn">⚙️ 환경설정</button>
    </div>
    <div class="form-group">
      <label for="doc-title">제목</label>
      <input type="text" id="doc-title" placeholder="예: 예약 버튼 오류 분석" value="">
    </div>

    <div class="form-group">
      <label for="doc-overview">개요</label>
      <textarea id="doc-overview" placeholder="작업의 전반적인 개요를 입력하세요."></textarea>
    </div>

    <div class="form-group">
      <label for="doc-role">역할</label>
      <textarea id="doc-role" placeholder="AI에게 부여할 역할을 입력하세요."></textarea>
    </div>

    <!-- Attachments Section -->
    <div class="list-container">
      <div class="list-header">
        <h2>첨부파일 목록</h2>
        <button class="btn btn-secondary btn-small" id="add-attachment-btn">+ 첨부파일 추가</button>
      </div>
      <div id="attachments-list">
        <!-- Attachments will be injected here -->
      </div>
    </div>

    <!-- Requirements Section -->
    <div class="list-container">
      <div class="list-header">
        <h2>요구사항</h2>
      </div>
      <div id="requirements-list">
        <!-- Requirements will be injected here -->
      </div>
      <div style="text-align: center; margin-top: 1rem;">
        <button class="btn btn-secondary btn-small" id="add-req-btn" style="width: 100%;">+ 요구사항 추가</button>
      </div>
    </div>

    <div class="form-group">
      <label for="file-path">저장 파일 경로</label>
      <input type="text" id="file-path" placeholder="예: /Users/username/data/prompt.md (비워두면 저장 대화상자 표시)">
    </div>

    <div class="form-group">
      <label for="category-path">카테고리 경로</label>
      <input type="text" id="category-path" placeholder="예: cate1.cate2.cate3" style="width: 400px;">
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="save-btn">
        저장
      </button>
    </div>

    <div id="status-message"></div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <h2 style="text-align: left;">환경설정</h2>
      <div class="form-group">
        <label for="mapping-file-path">Mapping 파일 경로</label>
        <input type="text" id="mapping-file-path" placeholder="예: /Users/username/mapping.json">
      </div>
      <div class="actions" style="margin-top: 1rem;">
        <button class="btn btn-secondary" id="close-settings-btn">취소</button>
        <button class="btn btn-primary" id="save-settings-btn" style="margin-left: 0.5rem;">저장</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
